strategy:
  lookback_months: 12
  target_volatility: 0.10
  rebalancing: monthly
  max_position_weight: 0.15
  vol_com_months: 3
  # --- Señal (mejora validada en el motor real con walk-forward) ---
  # signal_mode: binary (Moskowitz 2012) | strength (Baz 2015) | multihorizon (Baz 2015)
  # 'strength' (señal continua normalizada por vol) sube el Sharpe 0.27 -> 0.47.
  # multihorizon (blend de horizontes, Baz 2015) y class_balanced se probaron pero NO mejoran
  # en este universo de ETFs. multihorizon se SACÓ de las opciones del dashboard (rinde peor con
  # rebalanceo mensual); el código sigue en src/strategy/signals.py. Justificación en
  # TP_walkthrough.ipynb.
  signal_mode: strength
  lookbacks: [3, 6, 12]
  # weighting: pooled (1/N global) | class_balanced (presupuesto igual por clase de activo)
  weighting: pooled
  # Daniel & Moskowitz (2016): Momentum Crashes — filtro de crash regime
  use_crash_filter: true
  # Moreira & Muir (2017): Volatility-Managed Portfolios — vol-scaling del portafolio
  use_portfolio_vol_scaling: true
  target_portfolio_vol: 0.07

transaction_costs:
  bid_ask_spread: 0.001
  commission_pct: 0.0005

backtest:
  start_date: "2012-01-01"
  # end_date vacío = ventana abierta: el backtest usa hasta el último mes COMPLETO y
  # avanza solo a medida que cierran los meses (los datos se actualizan a diario vía
  # yfinance). Poner una fecha fija acá solo si se quiere congelar la ventana.
  end_date: null
  initial_capital: 1_000_000

data:
  path: "Data/etf_prices.parquet"
  yfinance_update: false
  # Meses mínimos de historia para incluir un ETF en el backtest. Los ETFs que
  # arrancaron después de 2012 se usan desde su inception; este piso evita meter
  # ETFs tan nuevos que nunca llegan a formar una señal (~2x el lookback máximo).
  min_history_months: 24

broker:
  host: "127.0.0.1"
  port: 7497
  client_id: 1
